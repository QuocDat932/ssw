<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BB8F0"/>
      <stop offset="40%" stop-color="#0F91E4"/>
      <stop offset="100%" stop-color="#04226C"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BB8F0"/>
      <stop offset="100%" stop-color="#0946A7"/>
    </linearGradient>
    <linearGradient id="gradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F91E4"/>
      <stop offset="50%" stop-color="#0946A7"/>
      <stop offset="100%" stop-color="#04226C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Top arc (right side, curving from top-right down to right) -->
  <path d="M 145,30 A 80,80 0 0,1 170,100" fill="none" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0,200;140,200" dur="1.5s" fill="freeze"/>
  </path>

  <!-- Bottom arc (left side, curving from bottom-left up to left) -->
  <path d="M 55,170 A 80,80 0 0,1 30,100" fill="none" stroke="url(#grad1)" stroke-width="5" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0,200;140,200" dur="1.5s" fill="freeze" begin="0.2s"/>
  </path>

  <!-- Dot top-right -->
  <circle cx="170" cy="100" r="8" fill="#0F91E4" filter="url(#glow)">
    <animate attributeName="r" values="0;8" dur="0.5s" begin="1s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
  </circle>

  <!-- Dot top (on top arc) -->
  <circle cx="145" cy="30" r="6" fill="#5BB8F0" filter="url(#glow)">
    <animate attributeName="r" values="0;6" dur="0.5s" begin="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
  </circle>

  <!-- Dot bottom-left -->
  <circle cx="30" cy="100" r="8" fill="#0946A7" filter="url(#glow)">
    <animate attributeName="r" values="0;8" dur="0.5s" begin="1.2s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.2s" fill="freeze"/>
  </circle>

  <!-- Dot bottom -->
  <circle cx="55" cy="170" r="6" fill="#0F91E4" filter="url(#glow)">
    <animate attributeName="r" values="0;6" dur="0.5s" begin="1.3s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.3s" fill="freeze"/>
  </circle>

  <!-- Letter S - double stroke style -->
  <!-- Outer S path -->
  <path d="M 120,58 C 120,58 130,50 118,42 C 106,34 82,38 74,50 C 66,62 68,72 80,80 L 110,96 C 126,106 130,118 120,132 C 110,146 88,152 74,144 C 64,138 60,128 60,128"
    fill="none" stroke="url(#gradS)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" values="0,400;320,400" dur="1.2s" fill="freeze" begin="0.3s"/>
  </path>

  <!-- Inner S highlight -->
  <path d="M 120,58 C 120,58 130,50 118,42 C 106,34 82,38 74,50 C 66,62 68,72 80,80 L 110,96 C 126,106 130,118 120,132 C 110,146 88,152 74,144 C 64,138 60,128 60,128"
    fill="none" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
    <animate attributeName="stroke-dasharray" values="0,400;320,400" dur="1.2s" fill="freeze" begin="0.5s"/>
  </path>

  <!-- Subtle pulsing glow on dots -->
  <circle cx="170" cy="100" r="8" fill="none" stroke="#0F91E4" stroke-width="2" opacity="0">
    <animate attributeName="r" values="8;16" dur="2s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="30" cy="100" r="8" fill="none" stroke="#0946A7" stroke-width="2" opacity="0">
    <animate attributeName="r" values="8;16" dur="2s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
</svg>
